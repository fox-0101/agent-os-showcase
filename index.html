<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent OS — Djungle</title>
  <meta name="description" content="I tuoi agenti AI per le migliori battaglie business. Agent OS by Djungle Startup Studio." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── Agent Avatars (Image-based) ────────────────────────────────

    function AgentAvatar({ slug, color, size = 48 }) {
      const hasImage = ["dean", "lora", "vince", "iron", "spacey", "set", "doc"].includes(slug);

      if (!hasImage) {
        return (
          <div
            className="rounded-2xl flex items-center justify-center font-bold text-white"
            style={{ width: size, height: size, backgroundColor: color, fontSize: size * 0.4 }}
          >
            {slug ? slug[0].toUpperCase() : "?"}
          </div>
        );
      }

      return (
        <div className="rounded-2xl overflow-hidden" style={{ width: size, height: size }}>
          <img
            src={`/${slug}.png`}
            alt={slug}
            width={size}
            height={size}
            style={{ width: size, height: size, objectFit: "cover", display: "block" }}
            loading="lazy"
          />
        </div>
      );
    }

    // ─── Components ───────────────────────────────────────────────────

    function StatusBadge({ status }) {
      const colors = {
        Active: "bg-emerald-50 text-emerald-700 border border-emerald-200",
        Draft: "bg-amber-50 text-amber-700 border border-amber-200",
        Testing: "bg-blue-50 text-blue-700 border border-blue-200",
        Archived: "bg-gray-100 text-gray-500 border border-gray-200"
      };
      return (
        <span className={`text-xs font-medium px-2.5 py-1 rounded-full ${colors[status] || colors.Draft}`}>
          {status}
        </span>
      );
    }

    function DomainPill({ domain }) {
      return (
        <span className="text-xs font-medium px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 border border-gray-200">
          {domain}
        </span>
      );
    }

    function AgentCard({ agent, onClick }) {
      return (
        <button
          onClick={() => onClick(agent)}
          className="card-hover group w-full text-left bg-white rounded-2xl border border-gray-200 p-6 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2"
        >
          <div className="flex items-start justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className="transition-transform group-hover:scale-110">
                <AgentAvatar slug={agent.slug} color={agent.color} size={48} />
              </div>
              <div>
                <h3 className="text-lg font-semibold text-gray-900 group-hover:text-black">
                  {agent.name}
                </h3>
                <p className="text-sm text-gray-400 font-mono">{agent.id}</p>
              </div>
            </div>
            <StatusBadge status={agent.status} />
          </div>

          <p className="text-sm font-medium text-gray-700 mb-1.5">{agent.role}</p>
          <p className="text-sm text-gray-500 mb-4 line-clamp-2">{agent.tagline}</p>

          <div className="flex flex-wrap gap-1.5 mb-4">
            {agent.domains.map((d) => (
              <DomainPill key={d} domain={d} />
            ))}
          </div>

          <div className="flex items-center justify-between pt-4 border-t border-gray-100">
            <div className="flex items-center gap-3 text-xs text-gray-400">
              <span className="font-medium">v{agent.version}</span>
              <span className="w-1 h-1 rounded-full bg-gray-300"></span>
              <span>{agent.invokeCount} invocazioni</span>
              {agent.lastInvoked && (
                <>
                  <span className="w-1 h-1 rounded-full bg-gray-300"></span>
                  <span>{agent.lastInvoked}</span>
                </>
              )}
            </div>
            <svg className="w-4 h-4 text-gray-300 group-hover:text-gray-900 group-hover:translate-x-0.5 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </button>
      );
    }

    function Section({ title, children }) {
      return (
        <div className="mb-8">
          <h3 className="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-3">
            {title}
          </h3>
          {children}
        </div>
      );
    }

    // ─── Agent Detail ─────────────────────────────────────────────────

    function AgentDetail({ agent, onBack }) {
      const [activeTab, setActiveTab] = useState("overview");

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setActiveTab("overview");
      }, [agent]);

      const tabs = [
        { id: "overview", label: "Overview", icon: "◉" },
        { id: "expertise", label: "Expertise", icon: "◆" },
        { id: "outputs", label: "Output", icon: "◧" },
        { id: "guardrails", label: "Guardrails", icon: "◈" }
      ];

      return (
        <div className="min-h-screen bg-gray-50 fade-in">
          {/* Header */}
          <div className="bg-white border-b border-gray-200">
            <div className="max-w-4xl mx-auto px-6 py-6">
              <button
                onClick={onBack}
                className="flex items-center gap-2 text-sm text-gray-400 hover:text-gray-900 transition-colors mb-8 group focus:outline-none"
              >
                <svg className="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
                Tutti gli agenti
              </button>

              <div className="flex items-start gap-5">
                <div className="flex-shrink-0 shadow-sm rounded-2xl overflow-hidden">
                  <AgentAvatar slug={agent.slug} color={agent.color} size={64} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-3 mb-1.5">
                    <h1 className="text-2xl font-bold text-gray-900">{agent.name}</h1>
                    <StatusBadge status={agent.status} />
                  </div>
                  <p className="text-base text-gray-500 mb-3">{agent.role}</p>
                  <div className="flex flex-wrap items-center gap-2 text-sm text-gray-400">
                    <span className="font-mono text-xs bg-gray-100 px-2 py-0.5 rounded">{agent.id}</span>
                    <span className="text-gray-300">·</span>
                    <span>v{agent.version}</span>
                    <span className="text-gray-300">·</span>
                    <span className="bg-gray-900 text-white text-xs px-2 py-0.5 rounded">{agent.platform.join(", ")}</span>
                    <span className="text-gray-300">·</span>
                    <span>{agent.invokeCount} invocazioni</span>
                    {agent.lastInvoked && (
                      <>
                        <span className="text-gray-300">·</span>
                        <span>Ultimo: {agent.lastInvoked}</span>
                      </>
                    )}
                  </div>
                </div>
              </div>

              {/* Tabs */}
              <div className="flex gap-1 mt-8 -mb-px overflow-x-auto">
                {tabs.map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-2.5 text-sm font-medium rounded-t-lg transition-all focus:outline-none whitespace-nowrap ${
                      activeTab === tab.id
                        ? "text-gray-900 bg-gray-50 border border-gray-200 border-b-gray-50 -mb-px"
                        : "text-gray-400 hover:text-gray-700"
                    }`}
                  >
                    <span className="mr-1.5 opacity-50">{tab.icon}</span>
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Content */}
          <div className="max-w-4xl mx-auto px-6 py-8 fade-in" key={activeTab}>
            {activeTab === "overview" && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div className="md:col-span-2 space-y-0">
                  <Section title="Missione">
                    <p className="text-gray-700 leading-relaxed text-base">{agent.mission}</p>
                  </Section>
                  <Section title="Personalità">
                    <p className="text-gray-700 leading-relaxed">{agent.personality}</p>
                  </Section>
                  <Section title="Stile di comunicazione">
                    <p className="text-gray-700 leading-relaxed">{agent.style}</p>
                  </Section>
                  <Section title="Contesto attuale">
                    <p className="text-gray-700 leading-relaxed">{agent.context}</p>
                  </Section>
                  <div className="rounded-xl p-5 border-l-4 mt-2" style={{ borderColor: agent.color, backgroundColor: agent.color + "08" }}>
                    <p className="text-sm italic text-gray-600 leading-relaxed">"{agent.quote}"</p>
                    <p className="text-xs font-medium mt-2" style={{ color: agent.color }}>— {agent.name}</p>
                  </div>
                </div>

                {/* Sidebar */}
                <div className="space-y-0">
                  <Section title="Domini">
                    <div className="flex flex-wrap gap-2">
                      {agent.domains.map((d) => <DomainPill key={d} domain={d} />)}
                    </div>
                  </Section>
                  <Section title="Tags">
                    <div className="flex flex-wrap gap-2">
                      {agent.tags.map((t) => (
                        <span key={t} className="text-xs font-medium px-2.5 py-1 rounded-full border" style={{ backgroundColor: agent.color + "10", color: agent.color, borderColor: agent.color + "30" }}>
                          {t}
                        </span>
                      ))}
                    </div>
                  </Section>
                  <Section title="Piattaforma">
                    <div className="flex items-center gap-2">
                      {agent.platform.map((p) => (
                        <span key={p} className="text-xs font-medium px-3 py-1.5 rounded-lg bg-gray-900 text-white">{p}</span>
                      ))}
                    </div>
                  </Section>
                  <Section title="Statistiche">
                    <div className="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
                      {[
                        ["Invocazioni", agent.invokeCount],
                        ["Versione", agent.version],
                        ["Ultimo uso", agent.lastInvoked || "—"]
                      ].map(([label, value]) => (
                        <div key={label} className="flex justify-between items-center">
                          <span className="text-sm text-gray-400">{label}</span>
                          <span className="text-sm font-semibold text-gray-900">{value}</span>
                        </div>
                      ))}
                      <div className="flex justify-between items-center pt-2 border-t border-gray-100">
                        <span className="text-sm text-gray-400">Slug</span>
                        <span className="text-xs font-mono px-2 py-0.5 rounded bg-gray-100 text-gray-600">{agent.slug}</span>
                      </div>
                    </div>
                  </Section>
                </div>
              </div>
            )}

            {activeTab === "expertise" && (
              <Section title={`${agent.expertise.length} Aree di expertise`}>
                <div className="space-y-3">
                  {agent.expertise.map((item, i) => {
                    const parts = item.split(" — ");
                    const title = parts[0];
                    const description = parts.slice(1).join(" — ");
                    return (
                      <div key={i} className="bg-white rounded-xl border border-gray-200 p-4 hover:border-gray-300 transition-colors">
                        <div className="flex items-start gap-3">
                          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0" style={{ backgroundColor: agent.color + "15", color: agent.color }}>
                            {i + 1}
                          </div>
                          <div>
                            <p className="font-medium text-gray-900">{title}</p>
                            {description && <p className="text-sm text-gray-500 mt-1">{description}</p>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Section>
            )}

            {activeTab === "outputs" && (
              <Section title={`${agent.outputs.length} Formati di output`}>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                  {agent.outputs.map((output) => (
                    <div key={output} className="bg-white rounded-xl border border-gray-200 p-4 text-center hover:border-gray-300 hover:shadow-sm transition-all">
                      <div className="w-10 h-10 rounded-lg mx-auto mb-3 flex items-center justify-center" style={{ backgroundColor: agent.color + "12" }}>
                        <svg className="w-5 h-5" style={{ color: agent.color }} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                      </div>
                      <p className="text-sm font-medium text-gray-700">{output}</p>
                    </div>
                  ))}
                </div>
              </Section>
            )}

            {activeTab === "guardrails" && (
              <Section title={`${agent.guardrails.length} Regole e vincoli`}>
                <div className="space-y-2">
                  {agent.guardrails.map((rule, i) => {
                    const isNever = rule.startsWith("MAI");
                    const isAlways = rule.startsWith("SEMPRE");
                    return (
                      <div key={i} className={`flex items-start gap-3 p-4 rounded-xl border transition-colors ${
                        isNever ? "bg-red-50/60 border-red-100 hover:border-red-200" :
                        isAlways ? "bg-emerald-50/60 border-emerald-100 hover:border-emerald-200" :
                        "bg-white border-gray-200"
                      }`}>
                        <div className={`w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 text-xs font-bold ${
                          isNever ? "bg-red-100 text-red-600" :
                          isAlways ? "bg-emerald-100 text-emerald-600" :
                          "bg-gray-100 text-gray-600"
                        }`}>
                          {isNever ? "✕" : "✓"}
                        </div>
                        <p className="text-sm text-gray-700 leading-relaxed">{rule}</p>
                      </div>
                    );
                  })}
                </div>
              </Section>
            )}
          </div>
        </div>
      );
    }

    // ─── Loading Spinner ──────────────────────────────────────────────

    function LoadingSpinner() {
      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="flex flex-col items-center gap-4">
            <div className="w-12 h-12 border-4 border-gray-200 border-t-gray-900 rounded-full animate-spin"></div>
            <p className="text-gray-400 text-sm">Caricamento agenti...</p>
          </div>
        </div>
      );
    }

    // ─── Error View ───────────────────────────────────────────────────

    function ErrorView({ error, onRetry }) {
      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="bg-white rounded-2xl border border-gray-200 p-8 max-w-md w-full mx-4">
            <div className="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mb-4">
              <svg className="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <h2 className="text-lg font-semibold text-gray-900 mb-2">Errore nel caricamento</h2>
            <p className="text-sm text-gray-500 mb-6">{error || "Non è stato possibile carica gli agenti. Riprovare."}</p>
            <button
              onClick={onRetry}
              className="w-full bg-gray-900 text-white rounded-lg px-4 py-2.5 text-sm font-medium hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2"
            >
              Riprova
            </button>
          </div>
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────

    function App() {
      const [agents, setAgents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [updatedAt, setUpdatedAt] = useState(null);
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [filter, setFilter] = useState("all");

      // Fetch agents on mount
      useEffect(() => {
        fetchAgents();
      }, []);

      const fetchAgents = async () => {
        setLoading(true);
        setError(null);
        try {
          const response = await fetch('/api/agents');
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          const data = await response.json();
          setAgents(data.agents || []);
          setUpdatedAt(data.updatedAt || null);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      // Handle browser back
      useEffect(() => {
        const handler = () => {
          if (selectedAgent) {
            setSelectedAgent(null);
          }
        };
        window.addEventListener('popstate', handler);
        return () => window.removeEventListener('popstate', handler);
      }, [selectedAgent]);

      const handleSelect = (agent) => {
        setSelectedAgent(agent);
        window.history.pushState({}, '', `#${agent.slug}`);
      };

      const handleBack = () => {
        setSelectedAgent(null);
        window.history.pushState({}, '', '/');
      };

      if (loading) {
        return <LoadingSpinner />;
      }

      if (error) {
        return <ErrorView error={error} onRetry={fetchAgents} />;
      }

      if (selectedAgent) {
        return <AgentDetail agent={selectedAgent} onBack={handleBack} />;
      }

      const allDomains = [...new Set(agents.flatMap((a) => a.domains))];
      const filtered = filter === "all" ? agents : agents.filter((a) => a.domains.includes(filter));
      const totalInvocations = agents.reduce((sum, a) => sum + a.invokeCount, 0);
      const activeCount = agents.filter((a) => a.status === "Active").length;

      return (
        <div className="min-h-screen bg-gray-50">
          {/* Hero */}
          <div className="bg-white border-b border-gray-200">
            <div className="max-w-5xl mx-auto px-6 py-12 md:py-16">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center">
                  <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" />
                  </svg>
                </div>
                <span className="text-sm font-semibold text-gray-400 tracking-wider uppercase">Djungle</span>
              </div>

              <h1 className="text-4xl md:text-5xl font-bold text-gray-900 mb-3">Agent OS</h1>
              <p className="text-lg text-gray-500 max-w-2xl leading-relaxed">
                I tuoi generali e soldati per le migliori battaglie business.<br className="hidden md:block" />
                Scegli un agente per vedere il suo profilo completo.
              </p>

              {/* Stats */}
              <div className="flex gap-10 mt-10">
                {[
                  [agents.length, "Agenti"],
                  [activeCount, "Attivi"],
                  [totalInvocations, "Invocazioni"]
                ].map(([num, label]) => (
                  <div key={label}>
                    <p className="text-3xl md:text-4xl font-bold text-gray-900">{num}</p>
                    <p className="text-sm text-gray-400 mt-0.5">{label}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Filters */}
          <div className="max-w-5xl mx-auto px-6 py-6">
            <div className="flex flex-wrap gap-2">
              <button
                onClick={() => setFilter("all")}
                className={`text-sm px-4 py-2 rounded-full border transition-all focus:outline-none ${
                  filter === "all"
                    ? "bg-gray-900 text-white border-gray-900 shadow-sm"
                    : "bg-white text-gray-500 border-gray-200 hover:border-gray-400 hover:text-gray-700"
                }`}
              >
                Tutti ({agents.length})
              </button>
              {allDomains.map((d) => (
                <button
                  key={d}
                  onClick={() => setFilter(filter === d ? "all" : d)}
                  className={`text-sm px-4 py-2 rounded-full border transition-all focus:outline-none ${
                    filter === d
                      ? "bg-gray-900 text-white border-gray-900 shadow-sm"
                      : "bg-white text-gray-500 border-gray-200 hover:border-gray-400 hover:text-gray-700"
                  }`}
                >
                  {d}
                </button>
              ))}
            </div>
          </div>

          {/* Agent Grid */}
          <div className="max-w-5xl mx-auto px-6 pb-16">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              {filtered.map((agent, i) => (
                <div key={agent.id} className="fade-in" style={{ animationDelay: `${i * 80}ms` }}>
                  <AgentCard agent={agent} onClick={handleSelect} />
                </div>
              ))}
            </div>
            {filtered.length === 0 && (
              <div className="text-center py-20">
                <p className="text-gray-400 text-lg">Nessun agente trovato per questo dominio.</p>
                <button onClick={() => setFilter("all")} className="mt-3 text-sm text-gray-900 underline underline-offset-4 hover:no-underline">
                  Mostra tutti
                </button>
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="border-t border-gray-200 bg-white">
            <div className="max-w-5xl mx-auto px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-2">
              <p className="text-xs text-gray-400">Agent OS — Djungle Startup Studio / FNX Holding</p>
              <div className="flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <p className="text-xs text-gray-400">
                  {updatedAt ? `Aggiornato: ${new Date(updatedAt).toLocaleString('it-IT')}` : "Dati da API"}
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
